<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EzySpeech Captions</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<!--
  OBS / streaming overlay — transparent background, large readable captions.

  Query params (all optional):
    mode=translated | original | both    (default: translated)
    lang=en|zh|yue|...                   (filter: only show entries whose source_language matches; default: any)
    lines=1..10                          (how many recent lines to keep on screen; default: 2)
    size=12..200                         (font size in px; default: 56)
    color=RRGGBB                         (text color; default: ffffff)
    stroke=RRGGBB                        (outline color; default: 000000)
    strokew=0..16                        (outline width in px; default: 4)
    shadow=0|1                           (drop shadow; default: 1)
    bg=transparent | RRGGBB | RRGGBBAA   (background; default: transparent)
    align=left | center | right          (default: center)
    pos=top | center | bottom            (vertical anchor; default: bottom)
    pad=0..200                           (edge padding in px; default: 40)
    font=                                (CSS font-family; default: system sans)
    weight=100..900                      (default: 700)
    fade=ms                              (per-line fade-out after no updates; 0 = never; default: 0)
    maxchars=N                           (hard truncate per line; default: no limit)
    showorig=0|1                         (legacy alias for mode=both)

  Examples:
    /captions?mode=translated&size=64&pos=bottom
    /captions?mode=both&color=ffff00&stroke=000000&strokew=6
    /captions?bg=000000aa&align=left&pos=top
-->
<style>
    :root {
        --cap-size: 56px;
        --cap-color: #ffffff;
        --cap-stroke: #000000;
        --cap-strokew: 4px;
        --cap-pad: 40px;
        --cap-bg: transparent;
        --cap-weight: 700;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--cap-bg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--cap-color);
    }
    #stage {
        position: fixed;
        inset: 0;
        padding: var(--cap-pad);
        pointer-events: none;
    }

    /* TVNZ-style fixed N-line block. Text wraps naturally; typewriter
       appends chars. When the block overflows, we drop a word from the
       front so the visible window stays N lines tall — no horizontal
       motion, no scroll bounce. Calm and easy to read. */
    .cap-line {
        position: absolute;
        left: var(--cap-pad);
        right: var(--cap-pad);
        max-width: var(--cap-maxw, none);
        margin-left: auto;
        margin-right: auto;
        font-size: var(--cap-size);
        font-weight: var(--cap-weight);
        line-height: 1.3;
        height: calc(var(--cap-size) * 1.3 * var(--cap-lines, 2));
        opacity: 1;
        transition: opacity var(--cap-block-fade, 140ms) ease;
        -webkit-text-stroke: var(--cap-strokew) var(--cap-stroke);
        paint-order: stroke fill;
        text-shadow:
            0 2px 6px rgba(0,0,0,0.55),
            0 0 2px rgba(0,0,0,0.6);
        overflow: hidden;
        white-space: pre-wrap;
        word-wrap: break-word;
        word-break: normal;
    }
    .cap-line.fading { opacity: 0; }
    .cap-line .text { display: block; }
    /* Each word is its own span so we can fade it in independently. */
    .cap-line .w {
        display: inline-block;
        vertical-align: top;
        line-height: inherit;
        opacity: 0;
        transform: translateY(2px);
        transition:
            opacity var(--cap-word-fade, 140ms) ease-out,
            transform var(--cap-word-fade, 140ms) ease-out;
    }
    .cap-line .w.in {
        opacity: 1;
        transform: translateY(0);
    }

    /* Vertical anchoring. */
    #stage.pos-top    .cap-line { top: var(--cap-pad); }
    #stage.pos-bottom .cap-line { bottom: var(--cap-pad); }
    #stage.pos-center .cap-line { top: 50%; transform: translateY(-50%); }

    /* Horizontal alignment. */
    #stage.align-left   .cap-line { text-align: left; }
    #stage.align-center .cap-line { text-align: center; }
    #stage.align-right  .cap-line { text-align: right; }

    /* No-shadow variant */
    body.no-shadow .cap-line { text-shadow: none; }

    /* Status (only shown when ?debug=1) */
    #status {
        position: fixed;
        top: 6px;
        right: 8px;
        font-size: 11px;
        color: rgba(255,255,255,0.6);
        background: rgba(0,0,0,0.4);
        padding: 2px 6px;
        border-radius: 3px;
        font-family: monospace;
        display: none;
    }
    body.debug #status { display: block; }
</style>
</head>
<body>
<div id="stage" class="pos-bottom align-center" aria-live="polite" aria-atomic="false"></div>
<div id="status">connecting…</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
<script>
(function () {
    'use strict';

    // ── Param parsing ─────────────────────────────────────────────
    var qs = new URLSearchParams(window.location.search);
    function p(name, def) {
        var v = qs.get(name);
        return (v === null || v === '') ? def : v;
    }
    function pInt(name, def, min, max) {
        var n = parseInt(p(name, def), 10);
        if (isNaN(n)) n = def;
        if (typeof min === 'number') n = Math.max(min, n);
        if (typeof max === 'number') n = Math.min(max, n);
        return n;
    }
    function isHex(s) { return /^[0-9a-fA-F]{6}([0-9a-fA-F]{2})?$/.test(s); }
    function colorParam(name, def) {
        var v = (p(name, def) || '').replace(/^#/, '');
        return isHex(v) ? '#' + v : def;
    }

    var MODE      = (p('mode', 'translated') || 'translated').toLowerCase();
    if (p('showorig', '0') === '1') MODE = 'both';
    if (['translated','original','both'].indexOf(MODE) === -1) MODE = 'translated';

    var FILTER_LANG = (p('lang', '') || '').toLowerCase();
    // TVNZ-style: 2 lines by default. Text wraps; old words drop from front
    // when block overflows.
    var LINES     = pInt('lines',   2, 1, 6);
    var SIZE      = pInt('size',   56, 12, 200);
    var STROKEW   = pInt('strokew', 4, 0, 16);
    var WEIGHT    = pInt('weight', 700, 100, 900);
    var PAD       = pInt('pad',    40, 0, 200);
    var FADE_MS       = pInt('fade',       0, 0, 600000);
    // Auto-clear a finalized line after N ms (default 8000). Once no new
    // updates arrive for this long after the last finalized sentence, the
    // ticker scrolls the rest of the buffer off-screen and resets.
    var CLEAR_FINAL   = pInt('clearfinal', 8000, 0, 600000);
    var MAXCHARS  = pInt('maxchars', 0, 0, 5000);
    // Idle timeout (ms): if no new caption arrives for this long, blank the
    // screen. Default 10s. Set `idle=0` to disable.
    var IDLE_MS       = pInt('idle', 10000, 0, 600000);
    // Edge fade width in px (where the text fades in/out at left/right edges).
    var FADE_PX       = pInt('edgefade', 120, 0, 1000);
    // How many characters of historical text to keep in the scrolling buffer
    // before trimming from the left. Larger = longer scroll-back ribbon.
    var BUFFER_CHARS  = pInt('buffer', 400, 50, 5000);
    // Typewriter speed: milliseconds per WORD (default 180ms ~ 330 wpm).
    var WORD_MS       = pInt('wordms', 180, 30, 2000);
    // Target words per line. Used to compute a max-width so wrapping
    // happens roughly around this count. ~6 reads comfortably.
    var WORDS_PER_LINE = pInt('wordsperline', 6, 2, 20);
    // Per-word fade-in duration (ms). 0 = no fade, instant.
    var WORD_FADE_MS  = pInt('wordfade', 140, 0, 2000);
    // Block fade duration when clearing/swapping sentences (ms).
    var BLOCK_FADE_MS = pInt('blockfade', 140, 0, 2000);
    var SHADOW    = p('shadow', '1') !== '0';

    var COLOR     = colorParam('color',  '#ffffff');
    var STROKE    = colorParam('stroke', '#000000');

    var ALIGN     = (p('align', 'center') || 'center').toLowerCase();
    if (['left','center','right'].indexOf(ALIGN) === -1) ALIGN = 'center';
    var POS       = (p('pos', 'bottom') || 'bottom').toLowerCase();
    if (['top','center','bottom'].indexOf(POS) === -1) POS = 'bottom';

    var BG_RAW = (p('bg', 'transparent') || 'transparent').toLowerCase().replace(/^#/, '');
    var BG = (BG_RAW === 'transparent' || BG_RAW === 'none')
        ? 'transparent'
        : (isHex(BG_RAW) ? '#' + BG_RAW : 'transparent');

    var FONT = p('font', '');
    var DEBUG = p('debug', '0') === '1';

    // ── Apply CSS vars ────────────────────────────────────────────
    var root = document.documentElement;
    root.style.setProperty('--cap-size',    SIZE + 'px');
    root.style.setProperty('--cap-color',   COLOR);
    root.style.setProperty('--cap-stroke',  STROKE);
    root.style.setProperty('--cap-strokew', STROKEW + 'px');
    root.style.setProperty('--cap-pad',     PAD + 'px');
    root.style.setProperty('--cap-bg',      BG);
    root.style.setProperty('--cap-weight',  String(WEIGHT));
    root.style.setProperty('--cap-lines',   String(LINES));
    root.style.setProperty('--cap-fade',    FADE_PX + 'px');
    // Cap line width to ~ WORDS_PER_LINE words. Average word ≈ 5 chars + 1
    // space, and `ch` ~ width of a digit, so use ~6.2ch per word as a
    // calm, readable estimate.
    root.style.setProperty('--cap-maxw',
        Math.round(WORDS_PER_LINE * 6.2) + 'ch');
    root.style.setProperty('--cap-word-fade',  WORD_FADE_MS  + 'ms');
    root.style.setProperty('--cap-block-fade', BLOCK_FADE_MS + 'ms');
    if (FONT) {
        // Allow only a safe subset of characters in font-family to avoid CSS injection.
        var safe = FONT.replace(/[^a-zA-Z0-9 ,_'"\-]/g, '');
        if (safe) document.body.style.fontFamily = safe + ', ' + getComputedStyle(document.body).fontFamily;
    }
    if (!SHADOW) document.body.classList.add('no-shadow');
    if (DEBUG) document.body.classList.add('debug');

    var stage = document.getElementById('stage');
    stage.classList.remove('pos-bottom', 'align-center');
    stage.classList.add('pos-' + POS, 'align-' + ALIGN);

    var status = document.getElementById('status');
    function setStatus(s) { if (status) status.textContent = s; }

    // ── Renderer (typewriter + horizontal ticker) ─────────────────
    // One running string slides left while a continuous rAF loop animates
    // each character in or out (typewriter). Mid-sentence corrections are
    // handled by deleting wrong trailing chars and retyping — same animator,
    // never stops/starts.

    function escapeHtml(s) {
        return String(s == null ? '' : s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function textFor(item) {
        var orig  = item.corrected || item.original || '';
        var trans = item.translated || '';
        if (MAXCHARS) {
            if (orig.length  > MAXCHARS) orig  = orig.slice(-MAXCHARS);
            if (trans.length > MAXCHARS) trans = trans.slice(-MAXCHARS);
        }
        if (MODE === 'original')      return orig;
        if (MODE === 'both' && trans) return orig + ' → ' + trans;
        return trans || orig;
    }

    function shouldShow(item) {
        if (!item) return false;
        if (FILTER_LANG) {
            var src = String(item.source_language || '').toLowerCase();
            if (src !== FILTER_LANG && src.split('-')[0] !== FILTER_LANG) {
                if (MODE === 'original') return false;
            }
        }
        return true;
    }

    // ─── Renderer (full rewrite — single source of truth) ────────
    //
    // Mental model:
    //   * One fixed-height block, LINES rows tall. Never scrolls.
    //   * The block holds AT MOST ONE "sentence" at a time (the `current`).
    //   * That sentence is a list of words. Each rendered word is its own
    //     <span class="w"> so it can fade in independently.
    //   * State: queue[] = words from `current` not yet typed onto the DOM.
    //     `current` = { key, words } currently on screen / being typed.
    //     `pending` = { key, words } scheduled to replace current after a
    //     block fade-out completes.
    //
    // All inputs (interim, final, correction) flow through `ingest(item)`.
    // ingest decides one of three things:
    //   A) item.key === current.key → diffApply(item.words) in place,
    //      no fades, smallest possible DOM change.
    //   B) item.key === pending.key → just update pending.words; the
    //      install will pick up the latest version when fade completes.
    //   C) Anything else → start a transition: fade out current, then
    //      install the new sentence. If a transition is already in
    //      progress, the latest target wins.
    //
    // Stale-event protection:
    //   * Finals carry a monotonically increasing `id`. We track
    //     `lastFinalId`. Any final with `id < lastFinalId` is dropped
    //     outright — that's a delayed translation for a sentence we've
    //     already moved past, which would otherwise cause "old text
    //     flashes back" bugs.
    //   * Interims (temp_id-only) get no extra guard; they only cause
    //     change if their key matches current/pending or the user really
    //     started a new sentence.
    //   * `translation_corrected` (admin edit) is special: it must NEVER
    //     cause a transition. If the corrected sentence isn't on screen,
    //     ignore it (re-fading would flash too fast to read).
    //
    var line = document.createElement('div');
    line.className = 'cap-line';
    line.innerHTML = '<span class="text"></span>';
    stage.appendChild(line);
    var textEl = line.querySelector('.text');

    var queue       = [];     // words from current sentence still to type
    var current     = null;   // { key, words[] } shown / being typed
    var pending     = null;   // { key, words[] } to install after fade-out
    var fading      = false;  // block is mid fade-out
    var typeTimer   = null;
    var idleTimer   = null;
    var clearTimer  = null;
    var lastFinalId = -1;     // monotonic stale-final guard

    // ── Past-key tracking ─────────────────────────────────────────
    // Keys we have moved past — i.e. they were once current/pending and
    // got replaced, idle-cleared, history-cleared, or had their final
    // applied. Any further event for these keys is a stale late delivery
    // and must be dropped, otherwise it would re-show old content.
    var pastKeys      = new Set();
    var pastKeysOrder = [];
    var PAST_MAX      = 500;
    function markPast(k) {
        if (k == null || pastKeys.has(k)) return;
        pastKeys.add(k);
        pastKeysOrder.push(k);
        if (pastKeysOrder.length > PAST_MAX) {
            pastKeys.delete(pastKeysOrder.shift());
        }
    }
    // Keys for which a final (item.id) has already been applied. Further
    // interim events (no id, just temp_id) for these keys are stale and
    // would otherwise revert the displayed text from "translated/final"
    // back to "raw interim".
    var keysFinalized = new Set();

    function tokenize(s) {
        s = (s || '').trim();
        return s ? s.split(/\s+/) : [];
    }

    function keyOf(item) {
        if (item.temp_id)    return 't' + item.temp_id;
        if (item.id != null) return 'i' + item.id;
        return null;
    }

    function hasContent() { return textEl.firstChild != null; }
    function clearWords() { textEl.textContent = ''; }

    function getRendered() {
        var spans = textEl.getElementsByClassName('w');
        return Array.prototype.slice.call(spans);
    }

    // Count distinct line-box rows by reading each word span's bounding
    // rect top. Robust against font-metric / sub-pixel rounding that makes
    // scrollHeight unreliable.
    function rowCount() {
        var spans = getRendered();
        if (spans.length === 0) return 0;
        var rows = 0, lastTop = null;
        for (var i = 0; i < spans.length; i++) {
            var top = spans[i].getBoundingClientRect().top;
            if (lastTop === null || Math.abs(top - lastTop) > 2) {
                rows++;
                lastTop = top;
            }
        }
        return rows;
    }

    function appendWord(w) {
        if (textEl.firstChild) textEl.appendChild(document.createTextNode(' '));
        var span = document.createElement('span');
        span.className = 'w';
        span.textContent = w;
        textEl.appendChild(span);
        requestAnimationFrame(function () { span.classList.add('in'); });
        return span;
    }

    function removeLastSpan() {
        var spans = getRendered();
        if (spans.length === 0) return;
        var last = spans[spans.length - 1];
        var prev = last.previousSibling;
        if (last.parentNode) last.parentNode.removeChild(last);
        if (prev && prev.nodeType === 3 && prev.parentNode) {
            prev.parentNode.removeChild(prev);
        }
    }

    // ─── Block fade ─────────────────────────────────────────────
    //
    // fade(commit): fade the block out, run `commit` (DOM mutation invisible
    // to the user), fade back in. If called during an in-progress fade, the
    // commit REPLACES the previous one (latest wins) — rapid-fire transitions
    // collapse to a single visible swap.
    var pendingCommit = null;
    function fade(commit) {
        if (BLOCK_FADE_MS <= 0) {
            try { commit(); } catch (e) { console.error(e); }
            scheduleNext();
            return;
        }
        pendingCommit = commit;
        if (fading) return;
        fading = true;
        line.classList.add('fading');
        setTimeout(function () {
            var cb = pendingCommit;
            pendingCommit = null;
            try { if (cb) cb(); } catch (e) { console.error(e); }
            void line.offsetHeight;        // force reflow
            line.classList.remove('fading');
            fading = false;
            // If something was queued during this fade's commit, run another fade.
            if (pendingCommit) {
                var next = pendingCommit;
                pendingCommit = null;
                fade(next);
            } else {
                scheduleNext();
            }
        }, BLOCK_FADE_MS);
    }

    // ─── Typewriter ─────────────────────────────────────────────
    function scheduleNext() {
        if (typeTimer != null) return;
        if (queue.length === 0) return;
        if (fading) return;
        typeTimer = setTimeout(function () {
            typeTimer = null;
            typeNext();
        }, WORD_MS);
    }

    function typeNext() {
        if (fading || queue.length === 0) return;
        var w = queue[0];
        var span = appendWord(w);
        if (rowCount() > LINES) {
            // Overflow: roll back this append. The current viewport is
            // full. Start a fresh viewport whose first word is `w`. We
            // also advance the sentence's offset so subsequent diff
            // applies against the correct sentence-relative window.
            removeLastSpan();
            var carry = queue.slice();
            queue = [];
            // The new viewport starts at sentence-index = (current offset
            // + everything that was rendered before this attempt).
            // Rendered count BEFORE the rolled-back append:
            var renderedBefore = getRendered().length;
            var newOffset = (current ? current.offset : 0) + renderedBefore;
            fade(function () {
                clearWords();
                if (current) current.offset = newOffset;
                queue = carry;
            });
            return;
        }
        queue.shift();         // commit
        scheduleNext();
    }

    // ─── Diff: align rendered + queue with newWords ─────────────
    //
    // newWords is the FULL sentence. We diff against the visible window
    // (rendered + queue), which represents newWords starting at
    // `current.offset`. Words before offset have already scrolled off the
    // top of the viewport in earlier overflow cycles and are gone for good.
    function diffApply(newWords) {
        var offset = current ? current.offset : 0;
        // If new sentence got SHORTER than what we already scrolled past
        // (very rare; usually means a totally different correction), reset
        // by transitioning. Falls through to caller.
        if (newWords.length < offset) {
            offset = 0;
            current.offset = 0;
            // Force a clean viewport with the new (shorter) text.
            var carry = newWords.slice();
            queue = [];
            fade(function () { clearWords(); queue = carry; });
            return;
        }
        var windowed = newWords.slice(offset);

        var rendered = getRendered();
        var R = rendered.length;
        var oldRendered = rendered.map(function (s) { return s.textContent; });
        var oldFull = oldRendered.concat(queue);
        var nO = oldFull.length, nN = windowed.length;

        var pre = 0, mp = Math.min(nO, nN);
        while (pre < mp && oldFull[pre] === windowed[pre]) pre++;
        if (pre === nO && pre === nN) return;       // identical

        var suf = 0, ms = Math.min(nO - pre, nN - pre);
        while (suf < ms && oldFull[nO - 1 - suf] === windowed[nN - 1 - suf]) suf++;

        if (pre >= R) {
            // Change is entirely past the rendered region; just rebuild queue.
            queue = windowed.slice(R);
            scheduleNext();
            return;
        }

        var sufInR = Math.min(suf, R - pre);
        var anchor = (R - sufInR < R) ? rendered[R - sufInR] : null;
        var oldMid = rendered.slice(pre, R - sufInR);
        var newMid = windowed.slice(pre, nN - sufInR);

        // 1) Patch overlap (silent text swap).
        var ovr = Math.min(oldMid.length, newMid.length);
        for (var i = 0; i < ovr; i++) {
            if (oldMid[i].textContent !== newMid[i]) {
                oldMid[i].textContent = newMid[i];
            }
        }
        // 2) Delete extras when middle shrunk.
        for (var d = oldMid.length - 1; d >= newMid.length; d--) {
            var sp = oldMid[d];
            var prev = sp.previousSibling;
            if (sp.parentNode) sp.parentNode.removeChild(sp);
            if (prev && prev.nodeType === 3 && prev.parentNode) {
                prev.parentNode.removeChild(prev);
            }
        }
        // 3) Insert new mid words (fade in).
        for (var ins = oldMid.length; ins < newMid.length; ins++) {
            var space = document.createTextNode(' ');
            var span = document.createElement('span');
            span.className = 'w';
            span.textContent = newMid[ins];
            if (anchor) {
                textEl.insertBefore(space, anchor);
                textEl.insertBefore(span, anchor);
            } else {
                if (textEl.firstChild) textEl.appendChild(space);
                textEl.appendChild(span);
            }
            (function (s) {
                requestAnimationFrame(function () { s.classList.add('in'); });
            }(span));
        }

        // 4) Rebuild queue (windowed coordinates).
        var newR = pre + newMid.length + sufInR;
        queue = windowed.slice(newR);

        // After insertions, we may now be overflowing. If so, advance the
        // sentence offset and transition to a fresh viewport with the
        // un-rendered tail.
        if (rowCount() > LINES) {
            // The new viewport will start where the un-rendered tail begins
            // in the full sentence: offset + (current rendered count).
            var nowRendered = getRendered().length;
            var newOffset = offset + nowRendered;
            var tail = newWords.slice(newOffset);
            queue = [];
            fade(function () {
                clearWords();
                if (current) current.offset = newOffset;
                queue = tail;
            });
            return;
        }
        if (queue.length > 0) scheduleNext();
    }

    // ─── Sentence transitions ──────────────────────────────────
    function installSentence(s) {
        // Caller has already cleared the DOM (or DOM is empty).
        current = { key: s.key, words: s.words.slice(), offset: 0 };
        if (typeTimer) { clearTimeout(typeTimer); typeTimer = null; }
        queue = s.words.slice();
        scheduleNext();
    }

    function transitionTo(key, words) {
        // The current sentence is being abandoned — record it as past so
        // any late events for it get dropped.
        if (current && current.key !== key) markPast(current.key);
        if (pending && pending.key !== key) markPast(pending.key);
        pending = { key: key, words: words.slice() };
        if (!hasContent() && !fading) {
            // Nothing to fade out; install immediately.
            var p = pending; pending = null;
            installSentence(p);
            return;
        }
        fade(function () {
            // Read pending fresh — it may have been updated mid-fade.
            var p = pending; pending = null;
            if (!p) return;
            // The previously-shown sentence is now leaving the screen.
            if (current) markPast(current.key);
            clearWords();
            installSentence(p);
        });
    }

    // ─── Timers ────────────────────────────────────────────────
    function armIdle() {
        if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
        if (!IDLE_MS) return;
        idleTimer = setTimeout(function () { clearAll(); }, IDLE_MS);
    }

    function armClearFinal(item) {
        if (clearTimer) { clearTimeout(clearTimer); clearTimer = null; }
        if (!CLEAR_FINAL || item.id == null) return;
        var k = (current && current.key) || (pending && pending.key) || null;
        clearTimer = setTimeout(function () {
            var nowK = (current && current.key) || (pending && pending.key) || null;
            if (nowK !== k) return;
            clearAll();
        }, CLEAR_FINAL);
    }

    function clearAll() {
        if (clearTimer) { clearTimeout(clearTimer); clearTimer = null; }
        if (idleTimer)  { clearTimeout(idleTimer);  idleTimer  = null; }
        if (typeTimer)  { clearTimeout(typeTimer);  typeTimer  = null; }
        if (current) markPast(current.key);
        if (pending) markPast(pending.key);
        queue = [];
        current = null;
        pending = null;
        if (!hasContent() && !fading) return;
        fade(function () { clearWords(); });
    }

    // ─── Ingest ────────────────────────────────────────────────
    function ingest(item) {
        if (!shouldShow(item)) return;
        var key = keyOf(item);
        if (key == null) return;

        // Drop events for keys we have already moved past. This catches
        // late-arriving interims/finals for sentences that were replaced,
        // idle-cleared, or history-cleared. Without this, branch C below
        // would happily fade away current content and re-show the stale
        // old sentence.
        if (pastKeys.has(key)) return;

        var isFinal = (item.id != null);

        // Stale-final guard (monotonic id). Catches finals delivered out
        // of order across keys. Interims (no id) bypass this; pastKeys
        // covers them.
        if (isFinal) {
            if (item.id < lastFinalId) return;
            lastFinalId = item.id;
        } else {
            // Interim event for a key whose final has already been
            // applied → stale. Dropping prevents the displayed final
            // text from being reverted to a raw interim transcript.
            if (keysFinalized.has(key)) return;
        }

        var words = tokenize(textFor(item));
        if (words.length === 0) return;

        // (A) Same as currently-shown sentence → in-place diff. But if
        // we're already transitioning AWAY from this sentence (pending
        // set), don't keep mutating it — it's about to disappear.
        if (current && key === current.key) {
            if (pending != null) return;
            current.words = words;
            diffApply(words);
            if (isFinal) keysFinalized.add(key);
            armIdle();
            armClearFinal(item);
            return;
        }

        // (B) Same as the sentence we're transitioning to → just refresh
        // pending; the fade-end install will pick up the latest words.
        if (pending && key === pending.key) {
            pending.words = words.slice();
            if (isFinal) keysFinalized.add(key);
            armIdle();
            armClearFinal(item);
            return;
        }

        // (C) New sentence — fade out and install.
        transitionTo(key, words);
        if (isFinal) keysFinalized.add(key);
        armIdle();
        armClearFinal(item);
    }

    // ─── Socket.IO ─────────────────────────────────────────────
    var socket;
    function getOrCreateClientId() {
        var k = '_client_id', id;
        try { id = localStorage.getItem(k); } catch (e) { id = null; }
        if (!id) {
            id = 'caption_' + Math.random().toString(36).slice(2, 12) + '_' + Date.now();
            try { localStorage.setItem(k, id); } catch (e) {}
        }
        return id;
    }

    setStatus('connecting…');
    try {
        socket = io({
            reconnection: true,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000,
            transports: ['websocket', 'polling'],
            query: { client_id: getOrCreateClientId(), type: 'caption' }
        });
    } catch (e) {
        setStatus('socket-init-failed');
        console.error('Socket init failed:', e);
        return;
    }

    socket.on('connect',       function ()    { setStatus('connected'); });
    socket.on('disconnect',    function ()    { setStatus('disconnected'); });
    socket.on('connect_error', function (err) {
        setStatus('error');
        console.warn('connect_error:', err && err.message);
    });

    socket.on('new_translation', function (data) {
        try { ingest(data || {}); }
        catch (e) { console.error('new_translation handler:', e); }
    });

    // Admin correction. Only patches if the corrected sentence is currently
    // on screen — never causes a transition or re-fades old content.
    socket.on('translation_corrected', function (data) {
        var item = data || {};
        if (!shouldShow(item)) return;
        var key = keyOf(item);
        if (key == null) return;
        if (pastKeys.has(key)) return;     // sentence has left the screen
        var words = tokenize(textFor(item));
        if (current && key === current.key && pending == null) {
            current.words = words;
            diffApply(words);
            return;
        }
        if (pending && key === pending.key) {
            pending.words = words.slice();
            return;
        }
        // Off-screen correction: ignore (intentional — re-fading would flash).
    });

    socket.on('realtime_transcription', function (data) {
        if (!data || !data.text) return;
        try {
            ingest({
                temp_id: data.temp_id,
                original: data.text,
                corrected: data.text,
                translated: '',
                source_language: data.source_language || ''
            });
        } catch (e) { console.error('realtime_transcription handler:', e); }
    });

    socket.on('history_cleared', function () {
        // Server reset all history (including next_translation_id back to 0).
        // Reset our stale-event guards too, otherwise new sentences after
        // reset (which start at id=0 again) would be mistaken for stale.
        pastKeys = new Set();
        pastKeysOrder = [];
        keysFinalized = new Set();
        lastFinalId = -1;
        clearAll();
    });

    // Note: no /api/history backfill — that endpoint requires auth and the
    // overlay is unauthenticated by design. Starts empty, fills via events.
})();
</script>
</body>
</html>
